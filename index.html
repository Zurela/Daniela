<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Daniela ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel',serif;
background:#0b1320;
color:white;
overflow-x:hidden;
text-align:center;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#startButton{
padding:20px 50px;
font-size:24px;
background:gold;
border:none;
cursor:pointer;
border-radius:10px;
}

#main{
display:none;
}

.hero{
padding:80px 20px;
background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2000') center center/cover;
}

.hero h1{
font-size:3rem;
text-shadow:3px 3px 10px black;
}

.hero p{
font-size:1.3rem;
margin-top:20px;
}

.triforce{
font-size:120px;
color:gold;
animation:pulse 2s infinite;
margin:40px 0;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.section{
padding:60px 20px;
}

.chest-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
margin-top:40px;
}

.chest{
font-size:100px;
cursor:pointer;
transition:0.4s;
}

.chest:hover{
transform:scale(1.2);
}

.message{
display:none;
margin-top:15px;
font-size:1.2rem;
color:#ffd700;
}

.counter{
font-size:2rem;
margin-top:20px;
}

.spotify{
max-width:500px;
margin:auto;
}

.final{
padding:80px 20px;
font-size:2rem;
background:#111;
}

.heart{
position:fixed;
font-size:24px;
animation:float 8s linear infinite;
pointer-events:none;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<div id="startScreen">

<h1 style="margin-bottom:30px;">
✨ La Leyenda de Daniela ✨
</h1>

<button id="startButton">
🎮 PRESS START
</button>

</div>

<div id="main">

<div class="hero">

<h1>Daniela ❤️</h1>

<p>Eres mi aventura favorita.</p>

<div class="triforce">▲</div>

</div>

<div class="section">

<h2>⏳ Tiempo de nuestra aventura</h2>

<div id="counter" class="counter"></div>

</div>

<div class="section">

<h2>🎵 Nuestras Canciones</h2>

<br>

<div class="spotify">

<iframe
style="border-radius:12px"
src="https://open.spotify.com/embed/track/5J4ZkQpzMUFojo1CtAZYpn"
width="100%"
height="152"
frameborder="0"
allowfullscreen
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<br><br>

<iframe
style="border-radius:12px"
src="https://open.spotify.com/embed/track/4frLb7nWtsz2ymBE6k2GRP"
width="100%"
height="152"
frameborder="0"
allowfullscreen
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

</div>

<div class="section">

<h2>🗝️ Abre los Cofres</h2>

<div class="chest-container">

<div>
<div class="chest" onclick="openChest(this,'Desde que llegaste, todo es mejor ❤️')">
📦
</div>
<div class="message"></div>
</div>

<div>
<div class="chest" onclick="openChest(this,'Tu sonrisa ilumina mis días ✨')">
📦
</div>
<div class="message"></div>
</div>

<div>
<div class="chest" onclick="openChest(this,'Gracias por acompañarme en esta aventura 🥰')">
📦
</div>
<div class="message"></div>
</div>

</div>

</div>

<div class="final">

<p>
Daniela...
</p>

<br>

<p>
No importa cuántas aventuras existan,
siempre elegiría recorrerlas contigo ❤️
</p>

</div>

</div>

<script>

document.getElementById("startButton").onclick=function(){

document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";

}

function openChest(chest,text){

chest.innerHTML="🎁";

let msg=chest.parentElement.querySelector(".message");

msg.style.display="block";

msg.innerHTML=text;

}

const startDate=new Date("2024-02-14");

function updateCounter(){

const now=new Date();

const diff=now-startDate;

const days=Math.floor(diff/(1000*60*60*24));

document.getElementById("counter").innerHTML=
days+" días juntos ❤️";

}

updateCounter();

setInterval(updateCounter,1000);

function createHeart(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},8000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
