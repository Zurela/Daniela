<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Leyenda de Daniela ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel',serif;
background:#08111f;
color:white;
overflow-x:hidden;
text-align:center;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom,#000,#08111f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#startScreen h1{
font-size:3rem;
margin-bottom:30px;
}

#startButton{
padding:20px 60px;
font-size:24px;
background:gold;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
}

#main{
display:none;
}

.hero{
padding:80px 20px;
}

.hero h1{
font-size:3.5rem;
margin-bottom:20px;
}

.hero p{
font-size:1.4rem;
}

.triforce{
font-size:140px;
color:gold;
animation:pulse 2s infinite;
margin-top:30px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.photo{
margin-top:50px;
}

.photo img{
width:320px;
max-width:90%;
border-radius:20px;
box-shadow:0 0 30px rgba(255,215,0,.5);
}

.section{
padding:60px 20px;
}

.counter{
font-size:2rem;
margin-top:20px;
color:gold;
}

.spotify{
max-width:600px;
margin:auto;
}

.chest-container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:40px;
}

.chest-card{
width:250px;
}

.chest{
width:140px;
cursor:pointer;
transition:.3s;
}

.chest:hover{
transform:scale(1.1);
}

.message{
display:none;
margin-top:20px;
font-size:1.2rem;
color:#ffd700;
}

.final{
padding:80px 20px;
background:#111;
font-size:1.8rem;
line-height:1.8;
}

.heart{
position:fixed;
bottom:-50px;
font-size:25px;
animation:floatUp 8s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div id="startScreen">

<h1>✨ La Leyenda de Daniela ✨</h1>

<button id="startButton">
🎮 PRESS START
</button>

</div>

<div id="main">

<section class="hero">

<h1>Daniela ❤️</h1>

<p>Eres mi aventura favorita.</p>

<div class="triforce">
▲
</div>

<div class="photo">
<img src="foto.JPG" alt="Nosotros">
</div>

</section>

<section class="section">

<h2>⏳ Nuestra aventura</h2>

<div id="counter" class="counter"></div>

</section>

<section class="section">

<h2>🎵 Nuestras canciones</h2>

<br>

<div class="spotify">

<iframe
style="border-radius:12px"
src="https://open.spotify.com/embed/track/5J4ZkQpzMUFojo1CtAZYpn"
width="100%"
height="152"
frameborder="0"
allowfullscreen
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<br><br>

<iframe
style="border-radius:12px"
src="https://open.spotify.com/embed/track/4frLb7nWtsz2ymBE6k2GRP"
width="100%"
height="152"
frameborder="0"
allowfullscreen
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

</section>

<section class="section">

<h2>🗝️ Cofres secretos</h2>

<div class="chest-container">

<div class="chest-card">

<img
src="cofre.JPG"
class="chest"
onclick="abrir(this,'Desde que llegaste, mis días tienen más color ❤️')">

<div class="message"></div>

</div>

<div class="chest-card">

<img
src="cofre.JPG"
class="chest"
onclick="abrir(this,'Gracias por compartir esta aventura conmigo ✨')">

<div class="message"></div>

</div>

<div class="chest-card">

<img
src="cofre.JPG"
class="chest"
onclick="abrir(this,'Te elegiría una y mil veces más ❤️')">

<div class="message"></div>

</div>

</div>

</section>

<section class="final">

<p>
Daniela...
</p>

<br>

<p>
En todos los juegos existe una misión principal.
</p>

<p>
Y en mi vida, tú eres la más importante ❤️
</p>

</section>

</div>

<script>

document.getElementById("startButton").onclick=function(){

document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";

}

function abrir(elemento,texto){

let mensaje=
elemento.parentElement.querySelector(".message");

mensaje.innerHTML=texto;

mensaje.style.display="block";

elemento.style.transform="scale(1.2)";
}

const fechaInicio=new Date("2025-11-21");

function actualizarContador(){

const hoy=new Date();

const diferencia=hoy-fechaInicio;

const dias=Math.floor(
diferencia/(1000*60*60*24)
);

document.getElementById("counter").innerHTML=
dias + " días juntos ❤️";

}

actualizarContador();

function crearCorazon(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=
(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(crearCorazon,600);

</script>

</body>
</html>
