<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#08111f">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>La Leyenda de Daniela ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Cinzel',serif;
background:#08111f;
color:white;
overflow-x:hidden;
text-align:center;
}

/* ---------------- START SCREEN ---------------- */

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#000,#08111f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

#startScreen h1{
font-size:2.5rem;
margin-bottom:25px;
color:gold;
}

#startScreen p{
margin-bottom:30px;
max-width:500px;
}

#startButton{
padding:18px 45px;
font-size:1.2rem;
font-weight:bold;
background:gold;
border:none;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

#startButton:hover{
transform:scale(1.08);
}

#main{
display:none;
}

/* ---------------- HERO ---------------- */

.hero{
padding:60px 20px;
}

.hero h1{
font-size:3rem;
margin-bottom:20px;
}

.hero p{
font-size:1.2rem;
}

.triforce{
font-size:120px;
color:gold;
margin:30px 0;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.photo{
margin-top:20px;
}

.photo img{
width:min(90vw,400px);
border-radius:25px;
box-shadow:0 0 25px rgba(255,215,0,.6);
}

/* ---------------- SECTION ---------------- */

.section{
padding:60px 20px;
}

.section h2{
margin-bottom:20px;
color:gold;
}

/* ---------------- COUNTER ---------------- */

.counter{
font-size:1.8rem;
font-weight:bold;
}

/* ---------------- SPOTIFY ---------------- */

.spotify{
max-width:600px;
margin:auto;
}

/* ---------------- CHESTS ---------------- */

.chest-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

.chest-card{
width:250px;
}

.chest{
width:150px;
cursor:pointer;
transition:.3s;
}

.chest:hover{
transform:scale(1.1);
}

.message{
display:none;
margin-top:15px;
font-size:1.1rem;
color:#FFD700;
}

/* ---------------- FINAL ---------------- */

.final{
background:#111;
padding:80px 20px;
font-size:1.5rem;
line-height:1.8;
}

/* ---------------- HEARTS ---------------- */

.heart{
position:fixed;
bottom:-50px;
pointer-events:none;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* ---------------- FADE EFFECT ---------------- */

.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

.hero h1{
font-size:2.2rem;
}

.hero p{
font-size:1rem;
}

.triforce{
font-size:80px;
}

.counter{
font-size:1.3rem;
}

.chest-container{
flex-direction:column;
align-items:center;
}

.chest{
width:180px;
}

.final{
font-size:1.2rem;
}

}

</style>

</head>

<body>

<div id="startScreen">

<h1>✨ La Leyenda de Daniela ✨</h1>

<p>
Presiona START para comenzar nuestra aventura.
</p>

<button id="startButton">
🎮 PRESS START
</button>

</div>

<div id="main">

<section class="hero fade">

<h1>Daniela ❤️</h1>

<p>Eres mi aventura favorita.</p>

<div class="triforce">
▲
</div>

<div class="photo">
<img src="foto.jpeg" alt="Nosotros">
</div>

</section>

<section class="section fade">

<h2>⏳ Tiempo de nuestra aventura</h2>

<div id="counter" class="counter"></div>

</section>

<section class="section fade">

<h2>🎵 Nuestras canciones</h2>

<div class="spotify">

<iframe
style="border-radius:12px"
src="https://open.spotify.com/embed/track/5J4ZkQpzMUFojo1CtAZYpn"
width="100%"
height="152"
frameborder="0"
allowfullscreen>
</iframe>

<br><br>

<iframe
style="border-radius:12px"
src="https://open.spotify.com/embed/track/4frLb7nWtsz2ymBE6k2GRP"
width="100%"
height="152"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</section>

<section class="section fade">

<h2>🗝️ Cofres Secretos</h2>

<div class="chest-container">

<div class="chest-card">

<img
src="cofre.jpg"
class="chest"
onclick="abrir(this,'Desde que llegaste, mis días son mejores ❤️')">

<div class="message"></div>

</div>

<div class="chest-card">

<img
src="cofre.jpg"
class="chest"
onclick="abrir(this,'Gracias por cada momento compartido ✨')">

<div class="message"></div>

</div>

<div class="chest-card">

<img
src="cofre.jpg"
class="chest"
onclick="abrir(this,'Si volviera a elegir, te elegiría otra vez ❤️')">

<div class="message"></div>

</div>

</div>

</section>

<section class="final fade">

<p>Daniela...</p>

<br>

<p>
Hay muchas aventuras en el mundo.
</p>

<p>
Pero mi favorita siempre será la que vivo contigo.
</p>

<br>

<p>
❤️
</p>

</section>

</div>

<script>

/* START */

document.getElementById("startButton").onclick=function(){

document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";

}

/* CHESTS */

function abrir(elemento,texto){

let mensaje=
elemento.parentElement.querySelector(".message");

mensaje.innerHTML=texto;
mensaje.style.display="block";

elemento.style.transform="scale(1.15)";

}

/* COUNTER */

const fechaInicio = new Date("2025-11-21");

function actualizarContador(){

const hoy = new Date();

let years = hoy.getFullYear() - fechaInicio.getFullYear();
let months = hoy.getMonth() - fechaInicio.getMonth();
let days = hoy.getDate() - fechaInicio.getDate();

if(days < 0){
months--;
days += 30;
}

if(months < 0){
years--;
months += 12;
}

document.getElementById("counter").innerHTML =
years + " años, " +
months + " meses y " +
days + " días ❤️";

}

actualizarContador();

/* HEARTS */

function crearCorazon(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(crearCorazon,500);

/* FADE EFFECT */

const observer = new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show");

}

});

});

document.querySelectorAll(".fade").forEach(el=>{

observer.observe(el);

});

</script>

</body>
</html>
